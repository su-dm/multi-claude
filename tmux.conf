# Generated by multi-claude; edits are overwritten at dashboard startup.

# Keep panes around when claude exits so we can show EXITED + last output
# and offer a restart (respawn-pane).
set -g remain-on-exit on

set -g mouse on
set -g history-limit 50000
set -g default-terminal "tmux-256color"
set -g escape-time 10

# -- dashboard keys (no prefix needed) --------------------------------------
# C-q: detach the dashboard client (everything keeps running).
bind-key -n C-q detach-client
# Alt-h / Alt-l: move focus between the sidebar and the Claude pane.
bind-key -n M-h select-pane -L
bind-key -n M-l select-pane -R
# Alt-z: zoom the focused pane to full screen (again to restore).
bind-key -n M-z resize-pane -Z
# Alt-1..9: display instance N; Alt-o: cycle to the next instance.
bind-key -n M-1 run-shell "env PYTHONPATH=/home/djole/code/multi-claude MULTI_CLAUDE_SOCKET='' MULTI_CLAUDE_DATA_DIR=. MULTI_CLAUDE_CLAUDE_CMD=/home/djole/code/multi-claude/tests/fake_claude.py MULTI_CLAUDE_POLL_INTERVAL=1.0 MULTI_CLAUDE_NOTIFY=1 /usr/bin/python3 -m multi_claude select 1"
bind-key -n M-2 run-shell "env PYTHONPATH=/home/djole/code/multi-claude MULTI_CLAUDE_SOCKET='' MULTI_CLAUDE_DATA_DIR=. MULTI_CLAUDE_CLAUDE_CMD=/home/djole/code/multi-claude/tests/fake_claude.py MULTI_CLAUDE_POLL_INTERVAL=1.0 MULTI_CLAUDE_NOTIFY=1 /usr/bin/python3 -m multi_claude select 2"
